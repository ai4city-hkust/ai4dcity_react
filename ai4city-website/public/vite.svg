<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景（可选，透明） -->
  <rect width="400" height="400" fill="none"/>

  <!-- AI4CITY LAB 3D 标志主体 -->
  <g transform="translate(50, 50)">
    <!-- 1. 左侧灰色面 (#4D4C4C) - 即你标记的部分 -->
    <path d="M40 90 L40 210 L65 225 L65 105 Z" fill="#4D4C4C"/>
    
    <!-- 2. 顶部的厚度/转折面 -->
    <path d="M40 90 L150 25 L150 45 L65 105 Z" fill="#222222"/>
    
    <!-- 3. 正面黑色部分 (A 的主横梁和立柱) -->
    <path d="M65 105 L150 55 L150 160 L130 172 L130 75 L65 112 Z" fill="#000000"/>
    
    <!-- 4. 中间部分 (I/连接处) -->
    <path d="M150 55 L165 45 L165 225 L150 215 Z" fill="#000000"/>
    
    <!-- 5. 右侧部分 (4 的结构) -->
    <path d="M165 45 L260 100 L260 210 L235 225 L235 115 L165 75 Z" fill="#000000"/>
    
    <!-- 6. 4 的内部横梁 -->
    <path d="M195 95 L195 240 L220 255 L220 110 Z" fill="#000000"/>
    
    <!-- 7. 4 的勾回部分 (底部转折) -->
    <path d="M260 210 L260 140 L235 155 L235 225 Z" fill="#000000"/>
  </g>

  <!-- 文字部分 -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-weight="900" font-size="38" text-anchor="middle" letter-spacing="2" fill="#000000">AI4CITY LAB</text>
</svg>